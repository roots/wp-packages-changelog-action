name: 'WP Packages Changelog Action'
description: 'Automatically comment WordPress plugin changelogs on pull requests when WP Packages dependencies change'
author: 'Roots Software LLC'
branding:
  icon: 'package'
  color: 'blue'

inputs:
  token:
    description: 'GitHub token with permissions to comment on PRs'
    required: false
    default: ${{ github.token }}
  max-changelog-length:
    description: 'Maximum length of each plugin changelog (characters)'
    required: false
    default: '4000'
  max-comment-length:
    description: 'Maximum total comment length (characters)'
    required: false
    default: '60000'

runs:
  using: 'composite'
  steps:
    - name: Comment changelogs on PR
      uses: actions/github-script@v7
      env:
        MAX_CHANGELOG_LENGTH: ${{ inputs.max-changelog-length }}
        MAX_COMMENT_LENGTH: ${{ inputs.max-comment-length }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          const MARKER = '<!-- wp-packages-changelog-bot -->';
          let pluginsMap = new Map();

          // Get the PR to find base and head refs
          const { data: pr } = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
          });

          let fetchWarnings = [];

          async function getComposerLock(ref) {
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'composer.lock',
                ref,
              });

              if (data.type !== 'file') {
                fetchWarnings.push(`composer.lock at \`${ref.substring(0, 7)}\` is not a file (type: ${data.type})`);
                return null;
              }

              // For large files, content may be empty — fall back to the blob API
              if (!data.content && data.sha) {
                const { data: blob } = await github.rest.git.getBlob({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  file_sha: data.sha,
                });
                return JSON.parse(Buffer.from(blob.content, 'base64').toString('utf8'));
              }

              if (!data.content) {
                fetchWarnings.push(`composer.lock at \`${ref.substring(0, 7)}\` has no content`);
                return null;
              }

              return JSON.parse(Buffer.from(data.content, 'base64').toString('utf8'));
            } catch (e) {
              if (e.status === 404) return null;
              fetchWarnings.push(`Failed to read composer.lock at \`${ref.substring(0, 7)}\`: ${e.message}`);
              return null;
            }
          }

          const [baseLock, headLock] = await Promise.all([
            getComposerLock(pr.base.sha),
            getComposerLock(pr.head.sha),
          ]);

          // null = fetch/parse error; missing file (404) returns null without a warning
          // Only proceed if we don't have warnings about failures
          if (fetchWarnings.length > 0) {
            console.log(`Warnings: ${fetchWarnings.join('; ')}`);
          }

          const getPluginVersions = (lock) => {
            const map = new Map();
            if (!lock) return map;
            for (const pkg of lock.packages || []) {
              if (pkg.name?.startsWith('wp-plugin/')) {
                map.set(pkg.name.replace('wp-plugin/', ''), pkg.version);
              }
            }
            return map;
          };

          const baseVersions = getPluginVersions(baseLock);
          const headVersions = getPluginVersions(headLock);

          for (const [name, headVersion] of headVersions) {
            const baseVersion = baseVersions.get(name);
            if (baseVersion !== headVersion) {
              pluginsMap.set(name, headVersion);
            }
          }

          const plugins = [...pluginsMap.keys()].sort();

          if (plugins.length === 0 && fetchWarnings.length === 0) {
            console.log('No WP Packages plugins changed');
            return;
          }

          // Find existing bot comment via hidden marker
          const comments = await github.rest.issues.listComments({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            per_page: 100,
          });
          const botComment = comments.data.find(c => c.body?.includes(MARKER));

          let comment = `${MARKER}\n# 🔌 WordPress Plugin Changelogs\n\n`;

          if (fetchWarnings.length > 0) {
            comment += `> **Warning:** ${fetchWarnings.join('; ')}\n>\n> Plugin changelog results may be incomplete.\n\n`;
          }
          let totalLength = 0;
          const maxCommentLength = parseInt(process.env.MAX_COMMENT_LENGTH);
          const maxChangelogLength = parseInt(process.env.MAX_CHANGELOG_LENGTH);

          for (const plugin of plugins) {
            try {
              const controller = new AbortController();
              const timeout = setTimeout(() => controller.abort(), 8000);

              const response = await fetch(
                `https://api.wordpress.org/plugins/info/1.0/${plugin}.json`,
                { signal: controller.signal }
              );

              if (!response.ok) throw new Error('Plugin not found');
              const data = await response.json();

              let stableTag = null;
              let versionWarning = '';
              const installedVersion = pluginsMap.get(plugin);

              if (installedVersion) {
                try {
                  const readmeResponse = await fetch(
                    `https://plugins.svn.wordpress.org/${plugin}/tags/${installedVersion}/readme.txt`,
                    { signal: controller.signal }
                  );

                  if (readmeResponse.ok) {
                    const readmeText = await readmeResponse.text();
                    const stableMatch = readmeText.match(/^Stable tag:\s*(.+)$/mi);
                    if (stableMatch) {
                      stableTag = stableMatch[1].trim();
                    }
                  }
                } catch (e) {
                  try {
                    const trunkResponse = await fetch(
                      `https://plugins.svn.wordpress.org/${plugin}/trunk/readme.txt`,
                      { signal: controller.signal }
                    );
                    if (trunkResponse.ok) {
                      const readmeText = await trunkResponse.text();
                      const stableMatch = readmeText.match(/^Stable tag:\s*(.+)$/mi);
                      if (stableMatch) {
                        stableTag = stableMatch[1].trim();
                      }
                    }
                  } catch (e2) {
                    console.log(`Could not fetch readme for ${plugin}`);
                  }
                }
              }

              if (installedVersion && stableTag) {

                const compareVersions = (a, b) => {
                  const partsA = a.split('.').map(n => parseInt(n, 10));
                  const partsB = b.split('.').map(n => parseInt(n, 10));
                  for (let i = 0; i < Math.max(partsA.length, partsB.length); i++) {
                    const partA = partsA[i] || 0;
                    const partB = partsB[i] || 0;
                    if (partA > partB) return 1;
                    if (partA < partB) return -1;
                  }
                  return 0;
                };

                if (compareVersions(installedVersion, stableTag) > 0) {
                  versionWarning = `> ⚠️ **Warning:** Installing version ${installedVersion} but stable tag is ${stableTag}. ` +
                    `This may be an unstable version. ` +
                    `\n\n`;
                }
              }

              clearTimeout(timeout);

              const changelog = data.sections?.changelog || 'No changelog available';

              const pluginSection =
                `## ${plugin}` + (installedVersion ? ` (v${installedVersion})` : '') + `\n\n` +
                versionWarning +
                `<details>\n<summary>View changelog</summary>\n\n` +
                changelog.substring(0, maxChangelogLength) +
                (changelog.length > maxChangelogLength ? '\n\n[...truncated]\n\n' : '\n\n') +
                `[View full changelog on WordPress.org](https://wordpress.org/plugins/${plugin}/#developers)\n\n` +
                `</details>\n\n`;

              if (totalLength + pluginSection.length < maxCommentLength) {
                comment += pluginSection;
                totalLength += pluginSection.length;
                continue;
              }

              comment += `\n\n⚠️ Additional plugins changed but comment size limit reached. Check composer files for details.\n`;
              break;
            } catch (error) {
              comment += `## ${plugin}\n\n⚠️ Could not fetch changelog (${error.message})\n\n`;
            }
          }

          // Upsert comment
          if (botComment) {
            await github.rest.issues.updateComment({
              comment_id: botComment.id,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            console.log('Updated existing comment');
            return;
          }

          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
          console.log('Created new comment');
